name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Copy data files
        run: |
          mkdir -p frontend/public/data frontend/public/data/output
          cp data/output/*.json frontend/public/data/ || echo "No root json files"
          cp data/output/*.json frontend/public/data/output/ || echo "No output json files"
          mkdir -p frontend/public/data/output/kg_v1_visualization frontend/public/data/output/kg_v1_pr_conditional_visualization
          cp -r data/output/kg_v1_visualization/. frontend/public/data/output/kg_v1_visualization/ || echo "No baseline KG bundle"
          cp -r data/output/kg_v1_pr_conditional_visualization/. frontend/public/data/output/kg_v1_pr_conditional_visualization/ || echo "No preview KG bundle"
          mkdir -p frontend/public/data/evolution_case_detail
          cp -r data/output/evolution_case_detail/. frontend/public/data/evolution_case_detail/ || echo "No evolution case detail"
          ls -la frontend/public/data/

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
